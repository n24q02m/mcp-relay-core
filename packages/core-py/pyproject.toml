[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-relay-core"
version = "1.3.1"
description = "Zero-env-config credential relay for MCP servers"
readme = "README.md"
requires-python = "==3.13.*"
license = { text = "MIT" }
authors = [{ name = "n24q02m", email = "quangminh2422004@gmail.com" }]
keywords = ["mcp", "relay", "credentials", "encryption", "e2e", "ecdh", "aes-256-gcm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "cryptography>=46.0.6",
    "httpx>=0.28.1",
    "platformdirs>=4.9.4",
]

[project.urls]
Homepage = "https://github.com/n24q02m/mcp-relay-core"
Repository = "https://github.com/n24q02m/mcp-relay-core"
Issues = "https://github.com/n24q02m/mcp-relay-core/issues"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-cov>=7.1",
    "ruff>=0.15.9",
    "ty>=0.0.28",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_relay_core"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.ty]
rules = { unresolved-import = "ignore", unresolved-attribute = "ignore", possibly-missing-attribute = "ignore" }

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
timeout = 30
