[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-relay-core"
version = "0.1.0"
description = "Zero-env-config credential relay for MCP servers"
requires-python = "==3.13.*"
license = { text = "MIT" }
authors = [{ name = "n24q02m", email = "quangminh2422004@gmail.com" }]
dependencies = [
    "cryptography>=46.0.5",
    "httpx>=0.27",
    "platformdirs>=4.3",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-timeout>=2.3",
    "pytest-cov>=7.1",
    "ruff>=0.15",
    "ty>=0.0.24",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_relay_core"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
timeout = 30
