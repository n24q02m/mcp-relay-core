[semantic_release]
version_toml = ["packages/core-py/pyproject.toml:project.version"]
build_command = """
python3 -c "import json, os; v = os.getenv('NEW_VERSION'); [open(f, 'w').write(json.dumps(dict(json.load(open(f)), version=v), indent=2) + '\n') for f in ['packages/core-ts/package.json', 'packages/relay-server/package.json']]"
"""
assets = [
    "packages/core-ts/package.json",
    "packages/relay-server/package.json"
]
tag_format = "v{version}"
commit_message = "chore(release): v{version}"
major_on_zero = false

[semantic_release.changelog]
changelog_file = "CHANGELOG.md"

[semantic_release.remote]
type = "github"
