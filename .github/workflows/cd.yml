name: CD

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - core-ts
          - core-py
          - relay-server
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ inputs.package }}
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mcp-relay-server
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/relay-server

jobs:
  # ============================================================================
  # Release TypeScript (core-ts or relay-server)
  # ============================================================================
  release-ts:
    if: inputs.package == 'core-ts' || inputs.package == 'relay-server'
    name: Release TypeScript (${{ inputs.package }})
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Build package
        run: cd packages/${{ inputs.package }} && bun run build

      # TODO: PSR semantic release for monorepo
      # - uses: python-semantic-release/python-semantic-release@v10
      #   id: release
      #   with:
      #     github_token: ${{ secrets.GH_PAT }}
      #     config_file: packages/${{ inputs.package }}/semantic-release.toml
      #     prerelease: ${{ inputs.release_type == 'beta' }}
      #     prerelease_token: beta

      # TODO: npm publish
      # - name: Publish to npm
      #   if: steps.release.outputs.released == 'true'
      #   run: cd packages/${{ inputs.package }} && npm publish --no-git-checks --tag ${{ steps.release.outputs.is_prerelease == 'true' && 'beta' || 'latest' }}
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================================
  # Release Python (core-py)
  # ============================================================================
  release-py:
    if: inputs.package == 'core-py'
    name: Release Python
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v6

      - name: Build package
        run: cd packages/core-py && uv build

      # TODO: PSR semantic release
      # - uses: python-semantic-release/python-semantic-release@v10
      #   id: release
      #   with:
      #     github_token: ${{ secrets.GH_PAT }}
      #     config_file: packages/core-py/semantic-release.toml
      #     prerelease: ${{ inputs.release_type == 'beta' }}
      #     prerelease_token: beta

      # TODO: PyPI publish
      # - name: Publish to PyPI
      #   if: steps.release.outputs.released == 'true'
      #   run: cd packages/core-py && uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # ============================================================================
  # Build Docker (relay-server only)
  # ============================================================================
  build-docker:
    name: Build Docker (${{ matrix.platform }})
    needs: release-ts
    if: inputs.package == 'relay-server' && needs.release-ts.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-ts.outputs.tag }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.DOCKERHUB_IMAGE }},${{ env.GHCR_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.artifact }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.artifact }}

      - run: |
          mkdir -p ${{ runner.temp }}/digests
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: digest-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*

  # ============================================================================
  # Merge Docker Manifests
  # ============================================================================
  merge-docker:
    name: Merge Docker Manifests
    needs: [release-ts, build-docker]
    if: inputs.package == 'relay-server' && needs.release-ts.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          VERSION: ${{ needs.release-ts.outputs.version }}
          IS_PRERELEASE: ${{ needs.release-ts.outputs.is_prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            TAGS="beta ${VERSION}"
          else
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            TAGS="latest ${VERSION} ${MINOR} ${MAJOR}"
          fi

          DIGESTS=$(cat ${{ runner.temp }}/digests/*)

          for IMAGE in "$DOCKERHUB_IMAGE" "$GHCR_IMAGE"; do
            TAG_ARGS=""
            for TAG in $TAGS; do
              TAG_ARGS="$TAG_ARGS -t ${IMAGE}:${TAG}"
            done
            docker buildx imagetools create $TAG_ARGS \
              $(echo "$DIGESTS" | xargs -I{} echo "${IMAGE}@{}")
          done
