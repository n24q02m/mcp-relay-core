name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mcp-relay-server
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/relay-server

jobs:
  # ============================================================================
  # Semantic Release (version bump, CHANGELOG, tag, GitHub Release)
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        id: release
        with:
          github_token: ${{ secrets.GH_PAT }}
          config_file: packages/core-py/semantic-release.toml
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GH_PAT }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Publish TypeScript packages to npm
  # ============================================================================
  publish-npm:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Inject version from PSR into package.json files
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          for pkg in packages/core-ts packages/relay-server; do
            node -e "const f='$pkg/package.json'; const p=require('./'+f); p.version='$VERSION'; require('fs').writeFileSync(f, JSON.stringify(p, null, 2)+'\n')"
            echo "Set $pkg version to $VERSION"
          done

      - name: Build and publish core-ts
        run: |
          cd packages/core-ts && bun run build
          VERSION=$(node -p "require('./package.json').version")
          if npm view @n24q02m/mcp-relay-core@"$VERSION" version 2>/dev/null; then
            echo "core-ts@$VERSION already published, skipping"
          else
            TAG=${{ needs.release.outputs.is_prerelease == 'true' && 'beta' || 'latest' }}
            npm publish --provenance --access public --no-git-checks --tag "$TAG"
          fi

      - name: Build and publish relay-server
        run: |
          cd packages/relay-server && bun run build
          VERSION=$(node -p "require('./package.json').version")
          if npm view @n24q02m/mcp-relay-server@"$VERSION" version 2>/dev/null; then
            echo "relay-server@$VERSION already published, skipping"
          else
            TAG=${{ needs.release.outputs.is_prerelease == 'true' && 'beta' || 'latest' }}
            npm publish --provenance --access public --no-git-checks --tag "$TAG"
          fi

  # ============================================================================
  # Publish Python package to PyPI
  # ============================================================================
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/core-py
          uv build
          VERSION=$(grep -m 1 "version =" pyproject.toml | cut -d '"' -f 2)
          if curl -s https://pypi.org/pypi/mcp-relay-core/json | grep -q "\"$VERSION\""; then
            echo "mcp-relay-core@$VERSION already published, skipping"
          else
            uv publish
          fi

  # ============================================================================
  # Build Docker (relay-server only)
  # ============================================================================
  build-docker:
    name: Build Docker (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.DOCKERHUB_IMAGE }},${{ env.GHCR_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.artifact }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.artifact }}

      - run: |
          mkdir -p ${{ runner.temp }}/digests
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: digest-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          retention-days: 1

  # ============================================================================
  # Merge Docker Manifests
  # ============================================================================
  merge-docker:
    name: Merge Docker Manifests
    needs: [release, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          VERSION: ${{ needs.release.outputs.version }}
          IS_PRERELEASE: ${{ needs.release.outputs.is_prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            TAGS="beta ${VERSION}"
          else
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            TAGS="latest ${VERSION} ${MINOR} ${MAJOR}"
          fi

          DIGESTS=$(cat ${{ runner.temp }}/digests/*)

          for IMAGE in "$DOCKERHUB_IMAGE" "$GHCR_IMAGE"; do
            TAG_ARGS=""
            for TAG in $TAGS; do
              TAG_ARGS="$TAG_ARGS -t ${IMAGE}:${TAG}"
            done
            docker buildx imagetools create $TAG_ARGS \
              $(echo "$DIGESTS" | xargs -I{} echo "${IMAGE}@{}")
          done

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: README.md

      - uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/mcp-relay-server
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md

  # =================== Notify Downstream ===================
  notify-downstream:
    name: Notify Downstream
    needs: [release, publish-npm, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Dispatch core-update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/n24q02m/n24q02m/dispatches \
            -f event_type=core-update \
            -f 'client_payload[core]=mcp-relay-core' \
            -f 'client_payload[version]=${{ needs.release.outputs.version }}' \
            -f 'client_payload[tag]=${{ needs.release.outputs.tag }}' \
            -f 'client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}'
