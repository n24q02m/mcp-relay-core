repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bun x biome check --write
        language: system
        types_or: [javascript, ts, tsx, jsx, json, css]

      - id: typescript-check
        name: typescript type check
        entry: bash -c 'cd packages/core-ts && bun x tsc --noEmit && cd ../relay-server && bun x tsc --noEmit'
        language: system
        types: [ts]
        pass_filenames: false

      - id: test-ts
        name: test (TypeScript)
        entry: bash -c 'cd packages/core-ts && bun run test && cd ../relay-server && bun run test'
        language: system
        types: [ts]
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: e05c5c0818279e5ac248ac9e954431ba58865e61 # v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --target-version=py313]
      - id: ruff-format

  - repo: local
    hooks:
      - id: test-py
        name: test (Python)
        entry: bash -c 'cd packages/core-py && uv run pytest --tb=short -q --timeout=30'
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b # v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude_types: [image]
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude_types: [image]

  - repo: local
    hooks:
      - id: enforce-commit
        name: Enforce feat and fix commit prefixes
        entry: 'bash -c ''MSG=$(head -1 "$1"); if [[ "$MSG" =~ ^(feat|fix)(\(\.+\))?:.+ ]] || [[ "$MSG" =~ ^chore\(release\):.+ ]]; then exit 0; fi; echo "ERROR: Only feat: and fix: prefixes allowed. Got: $MSG"; exit 1'' --'
        language: system
        stages: [commit-msg]
