services:
  relay:
    build: .
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - PORT=8080
      - PAGES_DIR=/app/pages
      - CORS_ORIGIN=http://localhost:3000
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/sessions"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
